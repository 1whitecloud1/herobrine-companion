modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
# 下面这一行就是让版本号自动跟随 gradle.properties 的关键
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''
${mod_description}
'''

[[mixins]]
config = "${mod_id}.mixins.json"

# ==================================
# 必需依赖项 (Required Dependencies)
# ==================================

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# ==================================
# 可选依赖项 (Optional Dependencies)
# ==================================

# 时装工坊 (Armourer's Workshop)
[[dependencies."${mod_id}"]]
modId = "armourers_workshop"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"

# 饰品栏 (Curios API)
[[dependencies."${mod_id}"]]
modId = "curios"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"

# JEI 物品管理器 (Just Enough Items)
[[dependencies."${mod_id}"]]
modId = "jei"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"

# KubeJS 脚本自定义
[[dependencies."${mod_id}"]]
modId = "kubejs"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"